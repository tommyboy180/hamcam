# --------------------------------------------------
#  go2rtc config for HamCAM
#  RTSP camera -> low-latency HLS / WebRTC
#
#  This file ships with an example camera URL so go2rtc boots
#  cleanly (it'll just sit there unable to connect to 192.168.1.100
#  until you finish the setup wizard at /setup.php). Don't edit this
#  by hand — the wizard rewrites it for you, and it'll match
#  whatever's in config.php.
# --------------------------------------------------

streams:
  cam:
    - rtsp://admin:changeme@192.168.1.100:554/stream1

api:
  listen: ":1984"         # go2rtc web dashboard
  origin: "*"             # allow HLS from the PHP container

rtsp:
  listen: ":8554"         # optional RTSP re-stream

webrtc:
  listen: ":8555/tcp"     # WebRTC (optional, for even lower latency)

# Low-latency HLS settings
hls:
  # Segment duration in seconds — lower = less latency, more CPU
  segment_duration: 1

log:
  level: warn
